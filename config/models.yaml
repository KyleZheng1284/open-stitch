# Open-Stitch Model Configuration
# All models go through NVIDIA NIM inference API by default.
# Set NVIDIA_API_KEY in .env to get started.

models:
  # ─── VLM (Vision + Language) ─────────────────────────────────────
  # Gemini 3 Pro via NIM — native multimodal (text + image + video)
  vlm:
    provider: nim
    model: gcp/google/gemini-3-pro
    base_url_env: NVIDIA_BASE_URL
    api_key_env: NVIDIA_API_KEY
    temperature: 0.1
    max_tokens: 8192
    # Vision settings
    base_fps: 1                    # 1 frame/sec for standard chunks
    high_energy_fps: 4             # 4 FPS when audio energy > threshold
    high_energy_threshold: 0.7
    max_chunk_duration_s: 30
    system_prompt: vlm_edit_grade  # references config/prompts/vlm_edit_grade.txt

  # ─── LLM (Text reasoning) ───────────────────────────────────────
  # Same Gemini 3 Pro for agent reasoning, structured generation
  llm:
    provider: nim
    model: gcp/google/gemini-3-pro
    base_url_env: NVIDIA_BASE_URL
    api_key_env: NVIDIA_API_KEY
    temperature: 0.4
    max_tokens: 4096

  # ─── ASR (Speech recognition) ───────────────────────────────────
  # Whisper runs locally — no API key needed
  asr:
    provider: whisper_local
    model: openai/whisper-large-v3-turbo
    device: cuda:0
    language: auto

  # ─── Alternatives ────────────────────────────────────────────────
  # Swap by changing 'provider' and 'model' above
  _alternatives:
    # Local Qwen VLM (self-hosted via vLLM)
    vlm_qwen35:
      provider: nim
      model: Qwen/Qwen3.5-397B-A17B-Instruct
      base_url: http://localhost:8000/v1
      native_video_input: true

    # Local Llama LLM (self-hosted via vLLM)
    llm_llama:
      provider: nim
      model: meta-llama/Llama-3.3-70B-Instruct
      base_url: http://localhost:8001/v1
      temperature: 0.4

    # Nemotron via NIM cloud
    llm_nemotron:
      provider: nim
      model: nvidia/nemotron-3-nano-30b-a3b
      base_url: https://integrate.api.nvidia.com/v1
      api_key_env: NVIDIA_API_KEY
      temperature: 0.1

    # OpenAI fallback
    llm_openai:
      provider: openai
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
