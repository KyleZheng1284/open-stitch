# Auto-Vid Model Configuration
# Swapping models = changing this file only. No code changes required.

models:
  asr:
    provider: whisper_local
    model: openai/whisper-large-v3-turbo
    device: cuda:0
    language: auto  # "auto" for auto-detect, or ISO 639-1 code

  vlm:
    provider: qwen35_vl
    model: Qwen/Qwen3.5-397B-A17B-Instruct
    device: cuda:0
    base_fps: 1                    # 1 frame per second for standard chunks
    high_energy_fps: 4             # 4 FPS when audio analyzer flags energy > 0.7
    high_energy_threshold: 0.7     # energy threshold for adaptive FPS decision
    native_video_input: true       # send raw video to model (not extracted frames)
    max_chunk_duration_s: 30       # max seconds per VLM call
    system_prompt: vlm_edit_grade  # references config/prompts/vlm_edit_grade.txt
    temperature: 0.1               # low temperature for structured JSON output
    max_tokens: 8192
    max_output_tokens: 200000

  vlm_cloud:                       # optional cloud tier for deep multi-chunk reasoning
    provider: gemini_pro
    model: gemini-3-pro
    enabled: false                 # disabled by default -- local-first
    use_for: deep_reasoning_only   # only used when ReAct agent explicitly requests cross-chunk analysis
    api_key_env: GEMINI_API_KEY
    max_output_tokens: 200000

  llm:
    provider: local_llama
    model: meta-llama/Llama-3.3-70B-Instruct
    endpoint: http://localhost:8000/v1
    temperature: 0.4
    max_tokens: 4096
    max_output_tokens: 200000

  # Alternative configurations (swap by changing 'provider' above)
  _alternatives:
    asr_riva:
      provider: riva_nim
      endpoint: http://localhost:50051
      model: riva-asr-en-us-conformer

    asr_openai:
      provider: whisper_api
      model: whisper-1
      api_key_env: OPENAI_API_KEY

    vlm_qwen_small:
      provider: qwen_vl
      model: Qwen/Qwen2.5-VL-7B-Instruct
      device: cuda:0
      native_video_input: false    # frame-by-frame for older Qwen-VL
      max_output_tokens: 200000

    vlm_vila_nim:
      provider: vila_nim
      endpoint: https://ai.api.nvidia.com/v1/vlm/nvidia/vila
      api_key_env: NIM_API_KEY
      max_output_tokens: 200000

    llm_nim:
      provider: nim_llm
      model: meta/llama-3.3-70b-instruct
      endpoint: https://integrate.api.nvidia.com/v1
      api_key_env: NIM_API_KEY
      max_output_tokens: 200000

    llm_openai:
      provider: openai
      model: gpt-4o
      api_key_env: OPENAI_API_KEY
      max_output_tokens: 200000
